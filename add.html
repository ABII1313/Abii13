<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личные финансы - Добавить операцию</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="container">
            <a href="index.html" class="logo">MyMoney</a>
            <ul class="nav-menu">
                <li><a href="index.html">Главная</a></li>
                <li><a href="add.html" class="active">Добавить</a></li>
                <li><a href="history.html">История</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <h1>➕ Добавить операцию</h1>
            
            <div id="message" class="message"></div>

            <div class="card">
                <form id="transaction-form">
                    <div class="form-group">
                        <label for="type">Тип операции:</label>
                        <select id="type" required>
                            <option value="income">Доход</option>
                            <option value="expense">Расход</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="category">Категория:</label>
                        <input type="text" id="category" placeholder="Например: Продукты, Зарплата" required>
                    </div>

                    <div class="form-group">
                        <label for="amount">Сумма (₽):</label>
                        <input type="number" id="amount" min="0" step="0.01" placeholder="0.00" required>
                    </div>

                    <div class="form-group">
                        <label for="date">Дата:</label>
                        <input type="date" id="date" required>
                    </div>

                    <div class="form-group">
                        <label for="description">Описание:</label>
                        <input type="text" id="description" placeholder="Описание операции" required>
                    </div>

                    <button type="submit" class="btn">Сохранить операцию</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Управление личными финансами</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
